---
- name: Television | Download installer
  ansible.builtin.get_url:
    url: https://alexpasmantier.github.io/television/install.sh
    dest: /tmp/television.sh
    mode: '755'

- name: Television | Execute installer
  ansible.builtin.command: sh /tmp/television.sh -y
  args:
    creates: /usr/bin/tv
  become: true

- name: Television | Remove installer
  ansible.builtin.file:
    path: /tmp/television.sh
    state: absent

- name: Television | Copy config
  ansible.builtin.copy:
    src: "{{ role_path }}/files/television"
    dest: "{{ ansible_facts.user_dir }}/.config/"
    mode: '644'
    directory_mode: '755'
