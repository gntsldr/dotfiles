---
- name: varlock | Download installer
  ansible.builtin.get_url:
    url: https://varlock.dev/install.sh
    dest: /tmp/install.sh
    mode: '755'

- name: varlock | Execute installer
  ansible.builtin.command: sh /tmp/install.sh --dir=/usr/local/bin
  args:
    creates: /usr/local/bin/varlock
  become: true

- name: varlock | Remove installer
  ansible.builtin.file:
    path: /tmp/varlock.sh
    state: absent
